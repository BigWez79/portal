<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Power Analytix · Invoicing</title>
<meta name="robots" content="noindex,nofollow" />
<script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@3/lib/msal-browser.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700&family=Albert+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#10183A; --brand:#507DE5; --brand-dark:#1B3A8C; --accent:#1B3A8C;
    --tint:#eef2fb; --line:#dde4f3; --muted:#69718c; --paper:#FFFFFF; --bg:#eef2fb;
    --amber:#B9770E; --amber-bg:#FCF3E3; --danger:#C0392B;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Albert Sans',system-ui,sans-serif;background:radial-gradient(130% 90% at 0% 0%,#dce7fb 0%,transparent 55%),radial-gradient(130% 90% at 100% 100%,#e3e9fa 0%,transparent 55%),var(--bg);color:var(--ink);
    line-height:1.4;-webkit-font-smoothing:antialiased;padding:24px 16px 60px;font-variant-numeric:tabular-nums;}
  .num{font-variant-numeric:tabular-nums;}
  h2,h1,.wordmark,.doc-title h1,.eyebrow,.grand .k,.items thead th{font-family:'Sora',sans-serif;}

  /* ---------- login gate ---------- */
  .gate{min-height:78vh;display:flex;align-items:center;justify-content:center;padding:20px;}
  .gate-card{background:#fff;border-radius:16px;padding:38px 34px;max-width:390px;width:100%;text-align:center;
    box-shadow:0 1px 2px rgba(15,23,40,.06),0 24px 60px -28px rgba(15,23,40,.35);}
  .gate .logo-row{justify-content:center;margin-bottom:18px;}
  .gate-h{font-family:'Sora',sans-serif;font-weight:700;font-size:20px;margin-bottom:8px;}
  .gate-p{font-size:13px;color:var(--muted);margin-bottom:22px;line-height:1.55;}
  .gate-p.err{color:var(--danger);font-weight:600;}
  .gate .btn{width:100%;padding:13px;justify-content:center;}
  .gate .ghost{width:100%;margin-top:10px;}

  /* ---------- control bar ---------- */
  .controls{max-width:820px;margin:0 auto 18px;background:var(--paper);border-radius:12px;
    box-shadow:0 1px 2px rgba(15,23,40,.06),0 10px 30px -18px rgba(15,23,40,.4);padding:16px 18px;}
  .acct{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px;padding:10px 12px;
    background:var(--tint);border:1px solid #D5D7F5;border-radius:9px;font-size:12.5px;}
  .acct .who{color:var(--ink);font-weight:600;} .acct .spacer{flex:1;}
  .acct .dot{width:8px;height:8px;border-radius:50%;background:#C2C5D6;flex:0 0 auto;}
  .acct .dot.on{background:#16C2B0;} .acct .dot.err{background:var(--danger);}
  .acct button{font-family:'Albert Sans',sans-serif;font-size:12.5px;font-weight:600;border:1px solid #D5D7F5;
    background:#fff;color:var(--brand-dark);border-radius:7px;padding:7px 13px;cursor:pointer;}
  .acct button:hover{filter:brightness(.97);}

  .tabbar{display:flex;gap:4px;margin-bottom:16px;border-bottom:1px solid var(--line);}
  .tab{font-family:'Sora',sans-serif;font-weight:700;font-size:13px;background:none;border:none;
    color:var(--muted);padding:10px 15px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;}
  .tab.active{color:var(--brand);border-bottom-color:var(--brand);}

  .ctl-row{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;}
  label.field{display:flex;flex-direction:column;gap:4px;font-size:11px;font-weight:600;color:var(--muted);}
  select,input.cfg{font-family:'Albert Sans',sans-serif;font-size:13px;border:1px solid var(--line);
    border-radius:8px;padding:9px 12px;background:#fff;color:var(--ink);}
  select{min-width:260px;font-weight:600;cursor:pointer;}
  .grow{flex:1;} .btns{display:flex;gap:8px;flex-wrap:wrap;}
  .btn{font-family:'Sora',sans-serif;font-weight:700;font-size:13px;background:var(--brand);color:#fff;
    border:none;border-radius:8px;padding:10px 18px;cursor:pointer;transition:background .15s,transform .15s;
    display:inline-flex;align-items:center;gap:6px;}
  .btn:hover{filter:brightness(1.06);transform:translateY(-1px);}
  .ghost{font-family:'Sora',sans-serif;font-weight:700;font-size:13px;background:#fff;
    border:1px solid var(--line);color:var(--ink);border-radius:8px;padding:10px 16px;cursor:pointer;}
  .ghost:hover{background:var(--tint);}
  .danger{font-family:'Sora',sans-serif;font-weight:700;font-size:13px;background:#fff;
    border:1px solid #F0C2C2;color:var(--danger);border-radius:8px;padding:10px 16px;cursor:pointer;}
  .danger:hover{background:#FCEDEC;}
  .btn:focus-visible,select:focus-visible,.ghost:focus-visible,.danger:focus-visible,.tab:focus-visible,
  input.cfg:focus-visible,.fld input:focus-visible,.fld select:focus-visible{outline:3px solid #b9cdf3;outline-offset:2px;}

  details.cfg-panel{margin-top:14px;border:1px solid var(--line);border-radius:10px;padding:0 14px;}
  details.cfg-panel summary{cursor:pointer;font-size:12px;font-weight:700;color:var(--brand-dark);padding:11px 0;list-style:none;}
  details.cfg-panel summary::-webkit-details-marker{display:none;}
  details.cfg-panel summary::before{content:"▸ ";color:var(--brand);}
  details.cfg-panel[open] summary::before{content:"▾ ";}
  .cfg-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:10px;padding:4px 0 16px;}
  .cfg-grid label{display:flex;flex-direction:column;gap:4px;font-size:10.5px;font-weight:600;color:var(--muted);}
  input.cfg{width:100%;}
  .status{margin-top:12px;font-size:12px;color:var(--muted);display:flex;flex-wrap:wrap;gap:14px;}
  .status b{color:var(--ink);font-weight:600;}
  .warn{margin-top:12px;background:var(--amber-bg);border:1px solid #F0DDB6;color:var(--amber);
    border-radius:8px;padding:10px 14px;font-size:12.5px;display:none;}
  .warn.show{display:block;}

  /* ---------- forms ---------- */
  .form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin:8px 0 14px;}
  .fld{display:flex;flex-direction:column;gap:5px;font-size:11px;font-weight:600;color:var(--muted);}
  .fld input,.fld select{font-family:'Albert Sans',sans-serif;font-size:14px;border:1px solid var(--line);
    border-radius:8px;padding:10px 12px;background:#fff;color:var(--ink);width:100%;}
  .fld input:focus,.fld select:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(80,125,229,.22);}
  .fld input[readonly]{background:#F3F4F8;color:var(--muted);cursor:not-allowed;}
  .form-actions{display:flex;gap:8px;flex-wrap:wrap;margin:4px 0 8px;}
  .step-title{font-family:'Sora',sans-serif;font-weight:700;font-size:14px;margin:8px 0 4px;
    display:flex;align-items:center;gap:9px;}
  .step-n{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;
    background:var(--brand);color:#fff;font-size:12px;font-family:'Sora',sans-serif;}
  hr.sep{border:none;border-top:1px solid var(--line);margin:18px 0;}
  .linetable{width:100%;border-collapse:collapse;margin:6px 0 10px;font-size:12.5px;}
  .linetable th{text-align:left;font-size:10px;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);
    padding:6px 8px;border-bottom:1px solid var(--line);}
  .linetable th.r,.linetable td.r{text-align:right;}
  .linetable td{padding:8px;border-bottom:1px solid var(--line);}
  .linetable .rm{color:var(--danger);background:none;border:none;cursor:pointer;font-weight:600;font-size:12px;padding:2px 6px;}
  .linetable .empty{color:var(--muted);}
  .linetotals{display:flex;gap:20px;justify-content:flex-end;font-size:13px;margin:4px 0 12px;}
  .linetotals span b{font-weight:700;} .linetotals .g{color:var(--brand);}
  .formmsg{font-size:12.5px;padding:6px 0;min-height:16px;}
  .formmsg.err{color:var(--danger);font-weight:600;} .formmsg.ok{color:#1E7A52;font-weight:600;}
  .hint{font-size:11.5px;color:var(--muted);margin:-6px 0 12px;}
  .hint b{color:var(--ink);} .hint a{color:var(--brand);font-weight:600;cursor:pointer;text-decoration:underline;}
  .busy{opacity:.55;pointer-events:none;}

  /* ---------- invoice sheet ---------- */
  .sheet{max-width:820px;margin:0 auto;background:var(--paper);border-radius:14px;overflow:hidden;
    box-shadow:0 1px 2px rgba(15,23,40,.06),0 24px 60px -28px rgba(15,23,40,.35);}
  header.inv{display:flex;justify-content:space-between;align-items:flex-start;gap:24px;padding:30px 44px 22px;}
  .logo-row{display:flex;align-items:center;gap:13px;}
  .emblem{display:flex;align-items:center;justify-content:center;}
  .emblem-img{height:46px;width:auto;display:block;}
  .wordmark{line-height:1.05;}
  .wordmark .p{display:block;font-weight:700;font-size:22px;letter-spacing:.005em;color:var(--ink);}
  .wordmark .a{display:block;font-weight:700;font-size:22px;letter-spacing:.005em;color:var(--brand);margin-top:-2px;}
  .wordmark .tag{display:block;font-family:'Albert Sans',sans-serif;font-size:9.5px;font-weight:600;letter-spacing:.16em;
    text-transform:uppercase;color:var(--muted);margin-top:5px;}
  .doc-title{text-align:right;}
  .doc-title h1{font-weight:700;font-size:32px;letter-spacing:.05em;color:var(--ink);}
  .doc-title .inv-no{margin-top:3px;font-family:'Sora',sans-serif;font-weight:600;font-size:14px;color:var(--brand);}
  .rule{height:4px;background:linear-gradient(90deg,var(--brand) 0%,var(--brand) 68%,var(--accent) 68%,var(--accent) 100%);}

  .meta{display:grid;grid-template-columns:1.05fr 1.05fr .9fr;gap:28px;padding:22px 44px 4px;}
  .eyebrow{font-weight:700;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--brand);margin-bottom:7px;}
  .block .name{font-weight:700;font-size:14px;margin-bottom:2px;}
  .block .ln{font-size:12px;}
  .block .sub{font-size:11.5px;color:var(--muted);margin-top:5px;}
  .block .sub b{color:var(--ink);font-weight:600;}
  .detail-row{display:flex;justify-content:space-between;font-size:12px;padding:2.5px 0;gap:12px;}
  .detail-row span:first-child{color:var(--muted);}
  .detail-row span:last-child{font-weight:600;text-align:right;}
  .detail-row.due{margin-top:5px;padding-top:7px;border-top:1px solid var(--line);}
  .detail-row.due span:last-child{color:var(--brand);font-weight:700;}
  .invfor{margin:18px 44px 0;padding:10px 15px;background:var(--tint);border-radius:9px;font-size:12.5px;}
  .invfor b{font-family:'Sora',sans-serif;font-weight:700;color:var(--brand-dark);}

  table.items{width:100%;border-collapse:collapse;margin:16px 0 0;}
  .items thead th{font-weight:700;font-size:10px;letter-spacing:.09em;text-transform:uppercase;color:#fff;
    background:var(--ink);padding:10px 10px;text-align:left;}
  .items thead th.r{text-align:right;} .items thead th.c{text-align:center;}
  .items thead th:first-child{padding-left:44px;} .items thead th:last-child{padding-right:44px;}
  .items tbody td{padding:9px 10px;font-size:12.5px;border-bottom:1px solid var(--line);vertical-align:top;}
  .items tbody td:first-child{padding-left:44px;color:var(--muted);font-weight:600;}
  .items tbody td:last-child{padding-right:44px;}
  .items tbody td.r{text-align:right;} .items tbody td.c{text-align:center;}
  .items .desc{font-weight:500;} .items .amt{font-weight:700;}
  .items tbody tr:nth-child(even){background:#FAFAFE;}

  .foot{display:grid;grid-template-columns:1fr 310px;gap:0;align-items:end;}
  .pay{padding:22px 0 0 44px;} .pay .eyebrow{margin-bottom:9px;}
  .pay-grid{display:grid;grid-template-columns:auto 1fr;gap:4px 16px;font-size:12px;}
  .pay-grid .k{color:var(--muted);} .pay-grid .v{font-weight:600;}
  .terms{margin-top:14px;font-size:11px;color:var(--muted);max-width:320px;}
  .terms b{color:var(--ink);font-weight:600;}
  .totals{padding:22px 44px 0 0;}
  .tline{display:flex;justify-content:space-between;font-size:12.5px;padding:6px 0;}
  .tline .k{color:var(--muted);} .tline .v{font-weight:600;}
  .tline.sep{border-top:1px solid var(--line);}
  .grand{margin-top:10px;background:var(--brand);color:#fff;border-radius:11px;padding:14px 18px;
    display:flex;justify-content:space-between;align-items:center;}
  .grand .k{font-weight:700;font-size:12px;letter-spacing:.08em;text-transform:uppercase;}
  .grand .v{font-family:'Sora',sans-serif;font-weight:700;font-size:22px;}
  .baseline{margin-top:26px;padding:15px 44px;border-top:1px solid var(--line);
    display:flex;justify-content:space-between;align-items:center;gap:16px;font-size:11px;color:var(--muted);}
  .baseline .vat{font-weight:600;color:var(--ink);}

  @media (max-width:680px){
    header.inv{flex-direction:column;} .doc-title{text-align:left;}
    .meta{grid-template-columns:1fr;gap:18px;} .foot{grid-template-columns:1fr;}
    header.inv,.meta,.invfor,.baseline,.pay,.totals{padding-left:22px;padding-right:22px;}
    .items thead th:first-child,.items tbody td:first-child{padding-left:22px;}
    .items thead th:last-child,.items tbody td:last-child{padding-right:22px;}
    select{min-width:0;width:100%;}
  }

  /* ---------- single A4 page print ---------- */
  @media print{
    @page{size:A4 portrait;margin:11mm;}
    html,body{background:#fff;padding:0;margin:0;-webkit-print-color-adjust:exact;print-color-adjust:exact;font-size:10.5px;}
    .controls,.gate,.suitehead,.scr-badge{display:none!important;}
    .sheet{box-shadow:none;border-radius:0;max-width:none;width:100%;}
    header.inv{padding:6px 6px 12px;}
    .emblem-img{height:40px;}
    .wordmark .p,.wordmark .a{font-size:19px;}
    .doc-title h1{font-size:27px;} .rule{height:3px;}
    .meta{padding:14px 6px 2px;gap:18px;}
    .invfor{margin:11px 6px 0;padding:7px 12px;}
    .items{margin-top:12px;} .items thead th{padding:7px 9px;}
    .items thead th:first-child{padding-left:6px;} .items thead th:last-child{padding-right:6px;}
    .items tbody td{padding:6.5px 9px;font-size:11px;}
    .items tbody td:first-child{padding-left:6px;} .items tbody td:last-child{padding-right:6px;}
    .items tbody tr,.items thead tr{page-break-inside:avoid;}
    .foot{padding-top:4px;} .pay{padding:16px 0 0 6px;} .totals{padding:16px 6px 0 0;}
    .grand{padding:12px 16px;} .grand .v{font-size:20px;}
    .baseline{margin-top:16px;padding:11px 6px;}
  }
</style>
</head>

function dParts(s){ const str=String(s||'').trim().split('T')[0]; const p=str.split(/[\/\-]/).map(x=>x.trim());
  if(p.length!==3) return null; let d,m,y;

/* ===================== GRAPH READ/WRITE ===================== */
async function getToken(){
  try{ const r=await msalInstance.acquireTokenSilent({scopes:SCOPES,account}); return r.accessToken; }
  catch(e){ await msalInstance.acquireTokenRedirect({scopes:SCOPES}); throw e; }
}
async function spReq(method,path,body){
  const token=await getToken();
  const res=await fetch(GRAPH+"/sites/"+CONFIG.siteId+path,{method,
    headers:{Authorization:"Bearer "+token,"Content-Type":"application/json",
      Prefer:"HonorNonIndexedQueriesWarningMayFailRandomly"},
    body:body?JSON.stringify(body):undefined});
  if(!res.ok && res.status!==204){ throw new Error(method+" "+res.status+" — "+(await res.text())); }
  return res.status===204?null:res.json();
}
async function getList(listId){
  const data=await spReq("GET","/lists/"+listId+"/items?$expand=fields&$top=500");
  return (data.value||[]).map(i=>{const f=i.fields||{}; f._itemId=i.id; return f;});
}
async function loadFromSharePoint(){
  setConn("Loading from SharePoint…",'on');
  try{
    const [cust,inv,det]=await Promise.all([getList(L.customers),getList(L.invoices),getList(L.details)]);
    CUSTOMERS=cust.map(f=>({num:num(f._itemId), name:f.CompanyName||f.Title||"", contact:f.ContactName||"",
      a1:f.Address1||"", a2:f.Address2||"", town:f.Town||"", postcode:f.Postcode||"",
      phone:f.Phone||"", email:f.Email||""})).filter(c=>c.name);
    const invNoById={}; inv.forEach(f=>{ invNoById[f._itemId]=f.InvoiceNo||f.Title||""; });
    INVOICES=inv.map(f=>({_id:f._itemId, no:f.InvoiceNo||f.Title||"", company:String(f.CustomerLookupLookupId??""),
      date:f.InvoiceDate||"", project:f.Project||"", taxRate:parseRate(f.TaxRate??0.20),
      taxTotal:num(f.TaxTotal), unitTotal:num(f.UnitTotal), invoiceTotal:num(f.InvoiceTotal),
      status:f.Status||"Draft", paidDate:f.PaidDate||""})).filter(i=>i.no);
    DETAILS=det.map(f=>({_id:f._itemId, desc:f.LineDescription||f.Title||"", item:f.ItemNo||"",
      inv:f.InvoiceLookup||invNoById[f.InvoiceLookupLookupId]||"",
      qty:num(f.Qty)||1, unit:num(f.UnitPrice), tax:num(f.Tax), total:num(f.LineTotal)})).filter(d=>d.inv);
    if(L.settings && !String(L.settings).includes("PASTE")){
      try{ const rows=await getList(L.settings); if(rows.length){ settingsItemId=rows[0]._itemId; applySettings(rows[0]); } }
      catch(e){ console.warn("Settings read failed",e); }
    }
    refreshStatus(); fillCustomerSelect(); refreshSelect($('invoiceSelect').value); updateInvoiceHint();
    setConn("Loaded "+INVOICES.length+" invoices · "+(account.name||account.username),'on');
  }catch(e){ console.error(e); setConn("Couldn't load lists — "+e.message,'err'); }
}

/* ===================== Last invoice number helper ===================== */
function nextInvoiceNo(last){ const m=String(last).match(/^(.*?)(\d+)$/);
  return m ? m[1]+String(+m[2]+1).padStart(m[2].length,'0') : null; }
function mostRecentInvoiceNo(){ if(!INVOICES.length) return null;
  let best=INVOICES[0]; INVOICES.forEach(i=>{ if(num(i._id)>num(best._id)) best=i; }); return best.no; }
function updateInvoiceHint(){
  const h=$('invHint'); if(!h) return;
  if(editMode){ h.innerHTML=''; return; }
  const last=mostRecentInvoiceNo();
  if(!last){ h.innerHTML='No invoices yet — start your sequence (e.g. PA-0001).'; return; }
  const nxt=nextInvoiceNo(last);
  h.innerHTML='Last invoice: <b>'+esc(last)+'</b>'+(nxt?' &nbsp;·&nbsp; <a id="useNext">use next: '+esc(nxt)+'</a>':'');

/* ===================== WRITE: invoice header ===================== */
async function saveHeader(){
  const msg=(t,c)=>{const m=$('headerMsg'); m.textContent=t; m.className='formmsg'+(c?' '+c:'');};
  const custId=$('f_customer').value, no=$('f_invno').value.trim(), date=$('f_date').value,
        project=$('f_project').value.trim(); let rate=parseFloat($('f_rate').value);
  if(!custId){return msg('Choose a customer.','err');}
  if(!no){return msg('Enter an invoice number.','err');}
  if(!date){return msg('Choose an invoice date.','err');}
  if(isNaN(rate)) rate=20;
  const rateDec=rate>1?rate/100:rate;
  const fields={ CustomerLookupLookupId:Number(custId), InvoiceDate:date+"T12:00:00Z",
                 Project:project, TaxRate:rate };
  $('panel-new').classList.add('busy');
  try{
    if(editMode && activeInvoice){
      if(!confirm('Save changes to '+activeInvoice.no+'?')){ $('panel-new').classList.remove('busy'); return; }
      await spReq("PATCH","/lists/"+L.invoices+"/items/"+activeInvoice.id+"/fields",fields);
      activeInvoice.rate=rateDec;
      await recalcAndSyncTotals();       // re-apply VAT to existing lines at (possibly new) rate
      msg('Changes saved.','ok');
    }else{
      if(INVOICES.some(i=>String(i.no).toLowerCase()===no.toLowerCase())){
        $('panel-new').classList.remove('busy'); return msg('Invoice '+no+' already exists — choose a different number.','err'); }
      if(!confirm('Save invoice '+no+'?')){ $('panel-new').classList.remove('busy'); return; }
      const created=await spReq("POST","/lists/"+L.invoices+"/items",
        {fields:Object.assign({Title:no, InvoiceNo:no, TaxTotal:0, UnitTotal:0, InvoiceTotal:0}, fields)});
      activeInvoice={id:created.id, no, rate:rateDec}; activeLines=[];
      msg('Invoice created — now add the lines below.','ok');
    }
    $('f_invno').setAttribute('readonly','');     // lock number once it exists
    $('linesForNo').textContent=activeInvoice.no;
    $('step-lines').style.display='';
    renderLines();
  }catch(e){ console.error(e); msg('Save failed — '+e.message,'err'); }
  finally{ $('panel-new').classList.remove('busy'); }
}

/* ===================== WRITE: lines ===================== */
function renderLines(){
  const t=$('lineTable');
  if(!activeLines.length){
    t.innerHTML='<tr><td class="empty">No lines yet. Add your first line above.</td></tr>';
  }else{
    t.innerHTML='<thead><tr><th>Item #</th><th>Description</th><th class="r">Qty</th><th class="r">Unit £</th>'+
      '<th class="r">VAT £</th><th class="r">Total £</th><th></th></tr></thead><tbody>'+
      activeLines.map(l=>`<tr><td>${esc(l.item)}</td><td>${esc(l.desc)}</td><td class="r num">${esc(l.qty)}</td>
        <td class="r num">${money(l.unit)}</td><td class="r num">${money(l.vat)}</td><td class="r num">${money(l.total)}</td>
        <td class="r"><button class="rm" data-rm="${l.id}">Remove</button></td></tr>`).join('')+'</tbody>';
    t.querySelectorAll('[data-rm]').forEach(b=>b.onclick=()=>removeLine(b.getAttribute('data-rm')));
  }
  const net=round2(activeLines.reduce((a,l)=>a+round2(l.qty*l.unit),0));
  const vat=round2(activeLines.reduce((a,l)=>a+l.vat,0));
  $('lineTotals').innerHTML=`<span>Net <b>${money(net)}</b></span><span>VAT <b>${money(vat)}</b></span>`+
    `<span class="g">Total <b>${money(round2(net+vat))}</b></span>`;
}
function lineTotalsCalc(){
  const net=round2(activeLines.reduce((a,l)=>a+round2(l.qty*l.unit),0));
  const vat=round2(activeLines.reduce((a,l)=>a+l.vat,0));
  return {net, vat, gross:round2(net+vat)};
}
async function syncHeaderTotals(){
  const t=lineTotalsCalc();
  await spReq("PATCH","/lists/"+L.invoices+"/items/"+activeInvoice.id+"/fields",
    {UnitTotal:t.net, TaxTotal:t.vat, InvoiceTotal:t.gross});
  const inv=INVOICES.find(i=>i._id===activeInvoice.id);
  if(inv){ inv.unitTotal=t.net; inv.taxTotal=t.vat; inv.invoiceTotal=t.gross; }
}
async function recalcAndSyncTotals(){
  // recompute each line's VAT/total at the current rate, push changes, then sync header
  for(const l of activeLines){
    const net=round2(l.qty*l.unit), vat=round2(net*activeInvoice.rate), total=round2(net+vat);
    if(vat!==l.vat || total!==l.total){
      l.vat=vat; l.total=total;
      await spReq("PATCH","/lists/"+L.details+"/items/"+l.id+"/fields",{Tax:vat,LineTotal:total});
    }
  }
  await syncHeaderTotals(); renderLines();
}
async function addLine(){
  const msg=(t,c)=>{const m=$('linesMsg'); m.textContent=t; m.className='formmsg'+(c?' '+c:'');};
  const item=$('l_item').value.trim(), desc=$('l_desc').value.trim();
  const qty=parseFloat($('l_qty').value)||1, unit=parseFloat($('l_unit').value);
  if(!desc){return msg('Enter a description.','err');}
  if(isNaN(unit)){return msg('Enter a unit price.','err');}
  const net=round2(qty*unit), vat=round2(net*activeInvoice.rate), total=round2(net+vat);
  $('step-lines').classList.add('busy');
  try{
    const created=await spReq("POST","/lists/"+L.details+"/items",
      {fields:{Title:desc.slice(0,255), LineDescription:desc, ItemNo:item,
        InvoiceLookupLookupId:Number(activeInvoice.id), Qty:qty, UnitPrice:unit, Tax:vat, LineTotal:total}});
    activeLines.push({id:created.id, item, desc, qty, unit, vat, total});
    await syncHeaderTotals(); renderLines();
    $('l_item').value=''; $('l_desc').value=''; $('l_qty').value='1'; $('l_unit').value=''; $('l_desc').focus();
    msg('Line added.','ok');
  }catch(e){ console.error(e); msg('Couldn\'t add line — '+e.message,'err'); }
  finally{ $('step-lines').classList.remove('busy'); }
}
async function removeLine(id){
  if(!confirm('Remove this line?')) return;
  $('step-lines').classList.add('busy');
  try{
    await spReq("DELETE","/lists/"+L.details+"/items/"+id);
    activeLines=activeLines.filter(l=>l.id!==id);
    await syncHeaderTotals(); renderLines();
  }catch(e){ console.error(e); const m=$('linesMsg'); m.textContent='Couldn\'t remove — '+e.message; m.className='formmsg err'; }
  finally{ $('step-lines').classList.remove('busy'); }
}

function showGate(message,isErr,signedIn){
  $('app').style.display='none'; $('gate').style.display='flex';
  const m=$('gateMsg'); m.textContent=message; m.className='gate-p'+(isErr?' err':'');
  $('gateSignIn').style.display=signedIn?'none':'';
  $('gateSignOut').style.display=signedIn?'':'none';
  $('gateSwitch').style.display=(signedIn&&isErr)?'':'none';   // wrong account? offer a switch
}
function revealApp(){
  $('gate').style.display='none'; $('app').style.display='';
  setConn("Signed in as "+(account.name||account.username),'on');
  switchTab('generate');
  loadFromSharePoint();
}
async function authorise(){
  const email=(account.username||'').toLowerCase();
  const yes=v=>v===true||v==="true"||v==="Yes";
  const allowed=new Set(BOOTSTRAP_ADMINS.map(e=>e.toLowerCase()));
  // Primary: Staff list flag HasInvoices (managed in SharePoint, no redeploys)
  try{
    const token=await getToken();
    const res=await fetch(GRAPH+"/sites/"+STAFF.siteId+"/lists/"+STAFF.listId+"/items?$expand=fields&$top=500",
      {headers:{Authorization:"Bearer "+token, Prefer:"HonorNonIndexedQueriesWarningMayFailRandomly"}});
    if(res.ok){
      const d=await res.json();
      (d.value||[]).forEach(i=>{ const f=i.fields||{};
        if(f.Title && yes(f.HasInvoices) && yes(f.Active)) allowed.add(String(f.Title).toLowerCase()); });
    }
  }catch(e){ console.warn('Staff read failed',e); }
  // Optional extra: AppUsers list
  if(CONFIG.lists.appusers && !String(CONFIG.lists.appusers).includes('PASTE')){
    try{ (await getList(CONFIG.lists.appusers)).forEach(f=>{ if(f.Email) allowed.add(String(f.Email).toLowerCase()); }); }
    catch(e){ console.warn('AppUsers read failed',e); }
  }
  if(allowed.has(email)) revealApp();
  else showGate('You are not authorised to use this app ('+email+'). Contact the administrator.',true,true);
}
async function initAuth(){
  try{
    msalInstance=new msal.PublicClientApplication(msalConfig);
    await msalInstance.initialize();
    const r=await msalInstance.handleRedirectPromise();
    if(r&&r.account) account=r.account;
    if(!account){const a=msalInstance.getAllAccounts(); if(a.length) account=a[0];}
    if(account){ authorise(); return; }
    // No local session: try silent SSO via the shared Microsoft session cookie
    try{
      const s=await msalInstance.ssoSilent({scopes:SCOPES});
      if(s&&s.account){ account=s.account; authorise(); return; }
    }catch(e){ /* no session — fall through to the sign-in button */ }
    showGate('Sign in with your Power Analytix account to continue.',false,false);
  }catch(e){ console.error('MSAL init',e); showGate('Sign-in is unavailable right now. Please refresh and try again.',true,false); }
}

/* ===================== STATUS / ALL INVOICES ===================== */
function dueDateOf(inv){ const dt=dParts(inv.date); if(!dt) return null;
  dt.setDate(dt.getDate()+seller().terms); return dt; }
function effStatus(inv){
  if(inv.status==="Paid") return "Paid";
  const due=dueDateOf(inv);
  if(inv.status!=="Draft" && due && due < new Date()) return "Overdue";
  return inv.status||"Draft";
}
function badge(st){
  const c={Draft:"#69718c",Sent:"#507DE5",Paid:"#1E7A52",Overdue:"#C0392B"}[st]||"#667085";
  return '<span style="display:inline-block;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:700;color:#fff;background:'+c+';">'+st+'</span>';
}
let invFilter="all";
function renderInvList(){
  const t=$('invTable'); if(!t) return;
  const now=new Date(), week=new Date(); week.setDate(week.getDate()+7);
  const rows=INVOICES.map(i=>({i, st:effStatus(i), due:dueDateOf(i)}));
  const outstanding=rows.filter(r=>r.st==="Sent"||r.st==="Overdue");
  const totalOut=outstanding.reduce((a,r)=>a+r.i.invoiceTotal,0);
  const nOver=rows.filter(r=>r.st==="Overdue").length;
  const nWeek=rows.filter(r=>r.st==="Sent"&&r.due&&r.due>=now&&r.due<=week).length;
  $('invSummary').innerHTML=
    '<span>Outstanding: <b style="color:var(--ink)">'+money(totalOut)+'</b></span>'+
    '<span>Overdue: <b style="color:'+(nOver? '#C0392B':'var(--ink)')+'">'+nOver+'</b></span>'+
    '<span>Due within 7 days: <b style="color:var(--ink)">'+nWeek+'</b></span>';
  let list=rows;
  if(invFilter==="outstanding") list=outstanding;
  else if(invFilter==="due7") list=rows.filter(r=>r.st==="Sent"&&r.due&&r.due>=now&&r.due<=week);
  else if(invFilter==="overdue") list=rows.filter(r=>r.st==="Overdue");
  else if(invFilter==="paid") list=rows.filter(r=>r.st==="Paid");
  document.querySelectorAll('#invFilters .ghost').forEach(b=>{
    b.style.borderColor = b.dataset.f===invFilter ? 'var(--brand)' : 'var(--line)';
    b.style.color = b.dataset.f===invFilter ? 'var(--brand)' : 'var(--ink)';
  });
  if(!list.length){ t.innerHTML='<tr><td class="empty">No invoices match this filter.</td></tr>'; return; }
  t.innerHTML='<thead><tr><th>Invoice</th><th>Customer</th><th>Date</th><th>Due</th><th class="r">Total £</th><th>Status</th><th></th></tr></thead><tbody>'+
    list.map(r=>{
      const cust=findCustomer(r.i);
      return '<tr><td style="font-weight:600;color:var(--brand)">'+esc(r.i.no)+'</td>'+
        '<td>'+esc(cust?cust.name:'')+'</td>'+
        '<td class="num">'+fmtDate(r.i.date)+'</td>'+
        '<td class="num">'+(r.due?r.due.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}):'')+'</td>'+
        '<td class="r num" style="font-weight:600">'+money(r.i.invoiceTotal)+'</td>'+
        '<td>'+badge(r.st)+'</td>'+
        '<td class="r" style="white-space:nowrap;">'+
          '<button class="rm" style="color:var(--brand)" data-view="'+esc(r.i.no)+'">View</button>'+
          (r.st!=="Paid"
            ? (r.st==="Draft"
                ? '<button class="rm" style="color:#3538CD" data-sent="'+r.i._id+'">Mark sent</button>'
                : '<button class="rm" style="color:#1E7A52" data-paid="'+r.i._id+'">Mark paid</button>')
            : '')+
        '</td></tr>';
    }).join('')+'</tbody>';
  t.querySelectorAll('[data-view]').forEach(b=>b.onclick=()=>{ switchTab('generate'); $('invoiceSelect').value=b.dataset.view; render(b.dataset.view); });
  t.querySelectorAll('[data-paid]').forEach(b=>b.onclick=()=>setStatus(b.dataset.paid,'Paid'));
  t.querySelectorAll('[data-sent]').forEach(b=>b.onclick=()=>setStatus(b.dataset.sent,'Sent'));
}
async function setStatus(id,st){
  const inv=INVOICES.find(i=>i._id===id); if(!inv) return;
  if(!confirm('Mark '+inv.no+' as '+st+'?')) return;
  const fields={Status:st}; if(st==='Paid') fields.PaidDate=new Date().toISOString().slice(0,10)+"T12:00:00Z";
  try{ await spReq("PATCH","/lists/"+L.invoices+"/items/"+id+"/fields",fields);
    inv.status=st; if(st==='Paid') inv.paidDate=fields.PaidDate;
    renderInvList(); render($('invoiceSelect').value);
  }catch(e){ alert('Update failed — '+e.message); }
}

$('gateSignIn').onclick=()=>msalInstance&&msalInstance.loginRedirect({scopes:SCOPES});
$('gateSwitch').onclick=()=>msalInstance&&msalInstance.loginRedirect({scopes:SCOPES,prompt:'select_account'});
$('gateSignOut').onclick=()=>msalInstance&&msalInstance.logoutRedirect({account});
$('signoutBtn').onclick=()=>msalInstance&&msalInstance.logoutRedirect({account});
$('reloadBtn').onclick=()=>loadFromSharePoint();
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>switchTab(t.dataset.tab));
document.querySelectorAll('#invFilters .ghost').forEach(b=>b.onclick=()=>{ invFilter=b.dataset.f; renderInvList(); });
$('invoiceSelect').addEventListener('change',e=>render(e.target.value));
document.querySelectorAll('.cfg').forEach(el=>el.addEventListener('input',()=>render($('invoiceSelect').value)));
$('saveHeaderBtn').onclick=saveHeader;
$('cancelNewBtn').onclick=()=>{resetNewForm();switchTab('generate');};
$('addLineBtn').onclick=addLine;
$('doneBtn').onclick=async()=>{ const no=activeInvoice?.no; await loadFromSharePoint(); switchTab('generate');
  if(no){ $('invoiceSelect').value=no; render(no); } resetNewForm(); };
$('editBtn').onclick=()=>{ const no=$('invoiceSelect').value; if(no) startEdit(no); };
$('deleteBtn').onclick=()=>{ const no=$('invoiceSelect').value; if(no) deleteInvoice(no); };
$('saveCustomerBtn').onclick=saveCustomer;
$('saveSettingsBtn').onclick=saveSettings;
$('cancelCustomerBtn').onclick=()=>['c_name','c_contact','c_a1','c_a2','c_town','c_postcode','c_phone','c_email'].forEach(i=>$(i).value='');

initAuth();
